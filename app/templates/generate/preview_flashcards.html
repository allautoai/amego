{% extends 'base.html' %}
{% block title %}Vista Previa de Flashcards - StudyAmego{% endblock %}

{% block content %}
<div class="mb-4 d-flex align-items-center">
    <a href="{{ url_for('generate.generate_index', id=deck.id) }}" class="btn btn-link text-decoration-none text-muted p-0 me-3">
        <i class="bi bi-arrow-left fs-4"></i>
    </a>
    <h2 class="fw-bold m-0 premium-gradient">Vista Previa</h2>
</div>

<p class="text-muted mb-4">Selecciona las flashcards que deseas añadir a tu mazo <strong>{{ deck.name }}</strong>.</p>

<form action="{{ url_for('generate.generate_flashcards_confirm', id=deck.id) }}" method="POST">
    <div class="row g-3 mb-4">
        {% for card in cards %}
        <div class="col-12">
            <div class="card border-primary" style="border-width: 2px;">
                <div class="card-body">
                    <div class="d-flex">
                        <div class="form-check fs-4 me-3">
                            <input class="form-check-input" type="checkbox" name="selected" value="{{ loop.index0 }}" id="check{{ loop.index0 }}" checked>
                        </div>
                        <div class="flex-grow-1">
                            <label for="check{{ loop.index0 }}" class="w-100 cursor-pointer" style="cursor: pointer;">
                                <h5 class="fw-bold mb-2">{{ card.question }}</h5>
                                <p class="text-muted mb-0">{{ card.answer }}</p>
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
    
    <div class="d-flex justify-content-end gap-2">
        <a href="{{ url_for('generate.generate_index', id=deck.id) }}" class="btn btn-outline-secondary">Descartar Todas</a>
        <button type="submit" class="btn btn-primary btn-lg">Guardar Seleccionadas</button>
    </div>
</form>
{% endblock %}
